
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phonebase}
      POSTGRES_USER: ${POSTGRES_USER:-phonebase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"   # только localhost — никогда не открывать наружу!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phonebase}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"   # только localhost

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-phonebase}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-phonebase}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      PD_ENCRYPTION_KEY: ${PD_ENCRYPTION_KEY}     # ключ шифрования ПД — отдельный!
      MEDIA_ROOT: /app/media
      PD_DOCS_ROOT: /app/pd_docs                  # персональные данные отдельно
      PURCHASE_DOCS_ROOT: /app/purchase_docs      # документы закупки по папкам IMEI
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      IMPORT_1C_HTML_URL: ${IMPORT_1C_HTML_URL:-}
      IMPORT_1C_HTML_PATH: ${IMPORT_1C_HTML_PATH:-/data/base.html}
      IMPORT_1C_NEW_HTML_PATH: ${IMPORT_1C_NEW_HTML_PATH:-/data/new.html}
      PUBLIC_URL: ${PUBLIC_URL:-https://basestock.ru}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      TRADEIN_FEED_TOKEN: ${TRADEIN_FEED_TOKEN:-}
    volumes:
      - media_files:/app/media
      - pd_documents:/app/pd_docs                 # том для ПД (можно зашифровать отдельно)
      - purchase_docs:/app/purchase_docs
      - /root/base.html:/data/base.html:ro
      - /root/new.html:/data/new.html:ro
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info -Q default,imports,parsing
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-phonebase}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-phonebase}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      PD_ENCRYPTION_KEY: ${PD_ENCRYPTION_KEY}
      MEDIA_ROOT: /app/media
      PD_DOCS_ROOT: /app/pd_docs
      PURCHASE_DOCS_ROOT: /app/purchase_docs
      IMPORT_1C_HTML_URL: ${IMPORT_1C_HTML_URL:-}
      IMPORT_1C_HTML_PATH: ${IMPORT_1C_HTML_PATH:-/data/base.html}
      IMPORT_1C_NEW_HTML_PATH: ${IMPORT_1C_NEW_HTML_PATH:-/data/new.html}
      IMPORT_INTERVAL_MINUTES: ${IMPORT_INTERVAL_MINUTES:-30}
    volumes:
      - media_files:/app/media
      - pd_documents:/app/pd_docs
      - purchase_docs:/app/purchase_docs
      - /root/base.html:/data/base.html:ro
      - /root/new.html:/data/new.html:ro
    depends_on:
      - postgres
      - redis

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.celery_app beat -l info
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      IMPORT_INTERVAL_MINUTES: ${IMPORT_INTERVAL_MINUTES:-30}
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - media_files:/app/media:ro
      - ./ssl:/etc/ssl/certs:ro
      # shop.basestock.ru (Next.js сайт mobileax) — nginx-конфиг и SSL
      - /opt/mobileax/docker/nginx-shop.conf:/etc/nginx/conf.d/shop.basestock.ru.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  media_files:
  pd_documents:    # монтировать на зашифрованный раздел LUKS на хосте
  purchase_docs:
